<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブログ管理画面｜六本松ごえん</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true</script>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main'
        },
        media_folder: 'images',
        public_folder: '/images',
        collections: [{
          name: 'blog',
          label: 'Blog Posts',
          files: [{
            name: 'posts',
            label: 'All Posts',
            file: 'blog/posts.json',
            fields: [{
              name: 'posts',
              label: 'Posts',
              widget: 'list',
              fields: [
                {name: 'slug',    label: 'Slug',    widget: 'string'},
                {name: 'title',   label: 'Title',   widget: 'string'},
                {name: 'date',    label: 'Date',    widget: 'datetime', format: 'YYYY-MM-DD', time_format: false},
                {name: 'excerpt', label: 'Excerpt', widget: 'text'},
                {name: 'image',   label: 'Image',   widget: 'image', required: false},
                {name: 'tags',    label: 'Tags',    widget: 'list'},
                {name: 'body',    label: 'Body',    widget: 'markdown'}
              ]
            }]
          }]
        }]
      }
    });
  </script>
</body>
</html>
